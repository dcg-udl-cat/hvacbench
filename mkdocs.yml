site_name: hvacbench
site_description: Environment backends for building HVAC control research.
site_url: https://dcg-udl-cat.github.io/hvacbench/
repo_url: https://github.com/dcg-udl-cat/hvacbench
repo_name: dcg-udl-cat/hvacbench

theme:
  name: material
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Concepts: concepts.md
  - Backends: backends.md
  - API reference: api.md
  - Development: development.md
  - SoftwareX readiness: softwarex.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            members_order: source
            show_root_heading: true
            show_source: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true
